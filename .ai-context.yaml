  update_frequency: "Weekly (or after major feature additions)"
  last_updated: "2026-05-11"
  next_review: "2026-05-18 (weekly check)"

  files_to_keep_in_sync:
    - CLAUDE.md                    (master guide — source of truth)
    - config/vif_config.yml        (all framework parameters)
    - .ai-context.yaml             (this file — portable AI context)
    - ONBOARDING.md                (new contributor guide)
    - docs/AGENTS.md               (agent inventory)

  changes_that_require_update:

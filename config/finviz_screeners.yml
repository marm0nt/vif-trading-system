# Custom FinViz Screener Definitions
# Each screener maps to a FinViz filter URL with shadow test comparison

screeners:
  hunt_1_3:
    name: "Hunt (1-3) - Growth + Institutions"
    description: "Sales QoQ growth 30%+, USA small caps, 3yr IPO window, short interest, SMA alignment"
    filters:
      - fa_salesqoq_u30      # Sales QoQ growth > 30%
      - geo_usa              # USA only
      - ind_stocksonly       # Stocks only
      - ipodate_prev3yrs     # IPO within last 3 years
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_short_o5          # Short % > 5%
      - ta_changeopen_u      # Gap up from open
      - ta_sma20_pa          # Price above 20 SMA
      - ta_sma200_pa         # Price above 200 SMA
      - ta_sma50_pa          # Price above 50 SMA
    sort_by: volume          # Sort by volume descending
    top_k: 10

  shorted_to_breakouts:
    name: "Shorted To Breakouts"
    description: "Small float, heavily shorted, gap up, oversold RSI, high volatility"
    filters:
      - sh_float_u20         # Float < 20M
      - sh_price_u20         # Price < $20
      - sh_relvol_o0.75      # Relative volume > 0.75
      - sh_short_o5          # Short % > 5%
      - ta_changeopen_u      # Gap up from open
      - ta_perf_dup          # Up performance (duplicate)
      - ta_rsi_os40          # RSI oversold (< 40)
      - ta_volatility_wo3    # Volatility > 3% week-over-week
    sort_by: performance     # Sort by short-term performance
    top_k: 10

  backtested_6mo_top1:
    name: "Backtested 6mo - Top 1 (1-3)"
    description: "EPS YoY 20%+, Sales QoQ 20%+, high volume, beta > 1, SMA alignment"
    filters:
      - fa_epsyoy1_o20       # EPS YoY growth > 20%
      - fa_salesqoq_o20      # Sales QoQ growth > 20%
      - ind_stocksonly       # Stocks only
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_short_o5          # Short % > 5%
      - ta_beta_o1           # Beta > 1.0
      - ta_changeopen_u      # Gap up from open
      - ta_sma20_pa          # Price above 20 SMA
      - ta_sma200_pa         # Price above 200 SMA
      - ta_sma50_pa          # Price above 50 SMA
    sort_by: volume          # Sort by volume descending
    top_k: 10

  gap_up_screener:
    name: "Gap Up Screener"
    description: "USA stocks with 7%+ gap up, high average volume"
    filters:
      - geo_usa              # USA only
      - ind_stocksonly       # Stocks only
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_o1          # Price > $1
      - ta_gap_u7            # Gap up > 7%
    sort_by: gap_pct         # Sort by gap percentage
    top_k: 15

  gap_down_screener:
    name: "Gap Down Screener"
    description: "USA stocks with 7%+ gap down, high average volume"
    filters:
      - geo_usa              # USA only
      - ind_stocksonly       # Stocks only
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_o1          # Price > $1
      - ta_gap_d7            # Gap down > 7%
    sort_by: gap_pct         # Sort by gap percentage
    top_k: 15

  kell_v1_vol_rsi:
    name: "Kell V1 - Vol & RSI"
    description: "Volume momentum with RSI confirmation"
    filters:
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_o20         # Price > $20
      - sh_relvol_o2         # Relative volume > 2x
      - ta_perf2_dup         # Performance duplicate
    top_k: 10

  kell_v2_52w_beta_vol:
    name: "Kell V2 - 52w, Beta, Vol"
    description: "52-week high/low breakout with beta > 1"
    filters:
      - sh_avgvol_o1000      # Avg volume > 1M
      - sh_price_o20         # Price > $20
      - ta_beta_o1           # Beta > 1.0
      - ta_highlow52w_nh     # Near 52-week high
    top_k: 10

  kell_v3_100pct_perf_vol:
    name: "Kell V3 - 100% Perf, Vol"
    description: "100%+ YTD performance with volume"
    filters:
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_o20         # Price > $20
      - ta_perf2_ytd100o     # 100%+ YTD performance
    top_k: 10

  kell_v4_gap_3pct:
    name: "Kell V4 - Gap 3%"
    description: "3% intraday gap with volume"
    filters:
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_o20         # Price > $20
      - ta_gap_u3            # Gap up > 3%
    top_k: 10

  combo_kell_all:
    name: "Combo Kell - All Combined"
    description: "Kell filters combined: volume, beta, performance, relative vol"
    filters:
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_o20         # Price > $20
      - sh_relvol_o0.75      # Relative volume > 0.75
      - ta_beta_o1           # Beta > 1.0
      - ta_perf2_ytd100o     # 100%+ YTD performance
    sort_by: volume          # Sort by volume
    top_k: 10

  a_edge_ib_obv_7_25:
    name: "A+ Edge IB/OBV (7/25)"
    description: "New highs, 1w +10%, 4w +20%, RSI overbought, high rel vol"
    filters:
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_relvol_o1.5       # Relative volume > 1.5
      - sh_short_high        # Short interest high
      - ta_perf_1w10o        # 1-week performance > 10%
      - ta_perf2_4w20o       # 4-week performance > 20%
      - ta_rsi_ob70          # RSI overbought (> 70)
    sort_by: newhigh         # Sort by new highs
    top_k: 10

  b_edge_loose_ib_obv_7_25:
    name: "B Edge Loose IB/OBV (7/25)"
    description: "Looser version: new highs, RSI, rel volume"
    filters:
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_relvol_o1         # Relative volume > 1.0
      - sh_short_high        # Short interest high
      - ta_rsi_nos40         # RSI not oversold (> 40)
    sort_by: newhigh         # Sort by new highs
    top_k: 10

  new_signal_pre_breakout_a_7_25:
    name: "New Signal Pre Breakout A+ (7/25)"
    description: "Small caps, $10-50, beta > 1, breakout formation"
    filters:
      - cap_smallover        # Small cap+
      - geo_usa              # USA only
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_10to50      # Price $10-50
      - sh_relvol_o1         # Relative volume > 1.0
      - sh_short_o5          # Short % > 5%
      - ta_beta_o1           # Beta > 1.0
    sort_by: newhigh         # Sort by new highs
    top_k: 10

  sr_pre_breakout_a_7_25:
    name: "S/R Pre Breakout A+ (7/25)"
    description: "Support/resistance breakout, $10-50, RSI confirmation"
    filters:
      - cap_smallover        # Small cap+
      - geo_usa              # USA only
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_10to50      # Price $10-50
      - sh_relvol_o0.75      # Relative volume > 0.75
      - sh_short_o5          # Short % > 5%
      - ta_beta_o1           # Beta > 1.0
      - ta_rsi_nos50         # RSI not oversold (> 50)
    sort_by: horizontal      # Sort by horizontal (support/resistance)
    top_k: 10

  vol_momentum_7_30:
    name: "Vol/Momentum (7/30)"
    description: "Volatility + momentum: small caps, high rel vol, beta > 1"
    filters:
      - cap_smallover        # Small cap+
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_price_10to50      # Price $10-50
      - sh_relvol_o1.5       # Relative volume > 1.5
      - sh_short_o5          # Short % > 5%
      - ta_beta_o1           # Beta > 1.0
      - ta_sma50_pa          # Price above 50 SMA
    sort_by: volatility1w    # Sort by 1-week volatility
    top_k: 10

  er_gap_ups:
    name: "ER Gap Ups"
    description: "Earnings month gap ups with institutional ownership, high beta"
    filters:
      - cap_smallover        # Small cap+
      - earningsdate_thismonth  # Earnings this month
      - sh_avgvol_o500       # Avg volume > 500k
      - sh_instown_o30       # Institutional ownership > 30%
      - sh_price_o10         # Price > $10
      - sh_relvol_o1.5       # Relative volume > 1.5
      - sh_short_u20         # Short % < 20%
      - ta_beta_o1           # Beta > 1.0
      - ta_gap_u2            # Gap up > 2%
      - ta_sma50_pa          # Price above 50 SMA
    sort_by: volatility1w    # Sort by 1-week volatility
    top_k: 10

  canslim_b_plus:
    name: "CANSLIM B+ Companies"
    description: "CANSLIM methodology B+ tier: 5yr 25%+ EPS, strong institutions"
    filters:
      - fa_eps5years_o25     # 5-year EPS growth > 25%
      - fa_epsqoq_o25        # Quarterly EPS growth > 25%
      - sh_float_u50         # Float < 50M
      - sh_instown_o30       # Institutional ownership > 30%
      - sh_price_o10         # Price > $10
      - ta_perf_13wup        # 13-week up trend
      - ta_sma200_pa         # Price above 200 SMA
      - ta_sma50_cross200a   # 50 SMA above 200 SMA (bullish cross)
    top_k: 15

  canslim_1_a_plus:
    name: "CANSLIM #1 A+ Companies"
    description: "CANSLIM methodology A+ tier: all 8 criteria, strongest setups"
    filters:
      - fa_eps5years_o25     # 5-year EPS growth > 25%
      - fa_epsqoq_o25        # Quarterly EPS growth > 25%
      - fa_epsyoy1_o10       # Annual EPS growth > 10%
      - fa_payoutratio_u30   # Payout ratio < 30%
      - fa_peg_low           # PEG ratio low
      - fa_roe_o15           # ROE > 15%
      - fa_salesqoq_o20      # Sales QoQ growth > 20%
      - sh_float_u50         # Float < 50M
      - sh_instown_o30       # Institutional ownership > 30%
      - sh_price_o10         # Price > $10
      - sh_short_u10         # Short % < 10%
      - ta_perf_13wup        # 13-week up trend
      - ta_sma200_pa         # Price above 200 SMA
      - ta_sma50_cross200a   # 50 SMA above 200 SMA (bullish cross)
    top_k: 15

  david_ryan_core:
    name: "David Ryan Core"
    description: "David Ryan methodology: small caps, 25%+ EPS/Sales, ROE > 15%, SMA50 alignment"
    filters:
      - cap_small            # Small cap
      - fa_epsqoq_o25        # Quarterly EPS growth > 25%
      - fa_roe_o15           # ROE > 15%
      - fa_salesqoq_o20      # Sales QoQ growth > 20%
      - sh_price_o10         # Price > $10
      - ta_sma50_pa          # Price above 50 SMA
    sort_by: industry        # Sort by industry
    top_k: 15

# Meta configuration for shadow testing
shadow_test_config:
  # Daily screeners (run every day premarket)
  daily_screeners:
    - hunt_1_3
    - backtested_6mo_top1
    - canslim_1_a_plus
    - gap_up_screener

  # Tactical screeners (run on breakout days)
  tactical_screeners:
    - shorted_to_breakouts
    - new_signal_pre_breakout_a_7_25
    - sr_pre_breakout_a_7_25
    - vol_momentum_7_30

  # Earnings-driven screeners (run earnings week)
  earnings_screeners:
    - er_gap_ups

  # Momentum screeners (run daily 15min intervals)
  momentum_screeners:
    - a_edge_ib_obv_7_25
    - b_edge_loose_ib_obv_7_25
    - kell_v1_vol_rsi
    - kell_v2_52w_beta_vol

  # Comparison metrics
  comparison_thresholds:
    overlap_warning: 0.20      # Alert if < 20% overlap with VIF
    overlap_success: 0.50      # Good if > 50% overlap
    confidence_delta_max: 25   # Max acceptable confidence deviation

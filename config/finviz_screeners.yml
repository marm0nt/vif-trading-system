# FinViz Screener Configuration - FIXED for finvizfinance API
# Valid filter names: see finvizfinance library documentation
# Each screener definition maps to a set of FinViz filters

screeners:
  hunt_1_3:
    name: "Hunt (1-3) - Growth + Institutions"
    description: "Growth stocks with institutional interest, high volume"
    filters:
      - Market Cap. = +Large (over $10bln)
      - Average Volume = Over 1M
      - Price = Over $20
      - RSI (14) = Overbought (70)
    sort_by: Volume
    top_k: 10

  shorted_to_breakouts:
    name: "Shorted To Breakouts"
    description: "Heavily shorted stocks with breakout potential"
    filters:
      - Float Short = Over 20%
      - Average Volume = Over 500K
      - Price = Over $5
      - RSI (14) = Oversold (30)
    sort_by: Performance
    top_k: 10

  backtested_6mo_top1:
    name: "Backtested 6mo - Top 1"
    description: "High growth with strong fundamentals"
    filters:
      - Market Cap. = Mid ($2bln to $10bln)
      - Average Volume = Over 500K
      - Price = Over $10
      - P/E = Low (<15)
    sort_by: Performance
    top_k: 10

  gap_up_screener:
    name: "Gap Up Screener"
    description: "Recent gap-up reversals with high volume"
    filters:
      - Average Volume = Over 500K
      - Price = Over $5
      - Gap = Up 5%
    sort_by: Gap
    top_k: 15

  gap_down_screener:
    name: "Gap Down Screener"
    description: "Recent gap-down stocks with volume"
    filters:
      - Average Volume = Over 500K
      - Price = Over $5
      - Gap = Down 5%
    sort_by: Gap
    top_k: 15

  kell_v1_vol_rsi:
    name: "Kell V1 - Vol & RSI"
    description: "Volume surges with momentum"
    filters:
      - Average Volume = Over 500K
      - Price = Over $20
      - Relative Volume = Over 1.5
      - RSI (14) = Overbought (70)
    top_k: 10

  kell_v2_52w_beta_vol:
    name: "Kell V2 - 52w High Breakout"
    description: "Breaking 52-week highs with beta"
    filters:
      - Average Volume = Over 1M
      - Price = Over $20
      - Beta = Over 1.5
      - Change from Open = Up
    top_k: 10

  kell_v3_100pct_perf_vol:
    name: "Kell V3 - 100% Perf"
    description: "100%+ YTD outperformers"
    filters:
      - Average Volume = Over 500K
      - Price = Over $20
      - Performance 2 = Year +100%
    top_k: 10

  kell_v4_gap_3pct:
    name: "Kell V4 - Gap 3%"
    description: "Small gaps with high relative volume"
    filters:
      - Average Volume = Over 500K
      - Price = Over $20
      - Gap = Up 3%
    top_k: 10

  combo_kell_all:
    name: "Combo Kell - All Combined"
    description: "Volume + momentum + gap + RSI"
    filters:
      - Average Volume = Over 500K
      - Price = Over $20
      - Relative Volume = Over 1.5
      - RSI (14) = Overbought (70)
    top_k: 10

  a_edge_ib_obv_7_25:
    name: "A+ Edge IB/OBV (7/25)"
    description: "Inside bar with OBV confirmation"
    filters:
      - Average Volume = Over 500K
      - Price = Over $10
      - Relative Volume = Over 1.5
      - Performance = Week Up
    top_k: 10

  b_edge_loose_ib_obv_7_25:
    name: "B Edge Loose IB/OBV (7/25)"
    description: "Loose inside bar setups"
    filters:
      - Average Volume = Over 500K
      - Price = Over $10
      - Relative Volume = Over 1
    top_k: 10

  new_signal_pre_breakout_a_7_25:
    name: "New Signal Pre Breakout A+ (7/25)"
    description: "Small cap breakout candidates"
    filters:
      - Market Cap. = Small ($300mln to $2bln)
      - Average Volume = Over 500K
      - Price = $10 to $50
      - Relative Volume = Over 1
    top_k: 10

  sr_pre_breakout_a_7_25:
    name: "S/R Pre Breakout A+ (7/25)"
    description: "Support/resistance breakout levels"
    filters:
      - Market Cap. = Small ($300mln to $2bln)
      - Average Volume = Over 500K
      - Price = $10 to $50
      - Relative Volume = Over 0.75
    top_k: 10

  vol_momentum_7_30:
    name: "Vol/Momentum (7/30)"
    description: "Volume + price momentum combo"
    filters:
      - Market Cap. = Small ($300mln to $2bln)
      - Average Volume = Over 500K
      - Price = $10 to $50
      - Relative Volume = Over 1.5
    top_k: 10

  er_gap_ups:
    name: "ER Gap Ups"
    description: "Earnings-related gap-up reversal setups"
    filters:
      - Market Cap. = Small ($300mln to $2bln)
      - Average Volume = Over 500K
      - Price = Over $10
      - Gap = Up 2%
    top_k: 10

  canslim_b_plus:
    name: "CANSLIM B+ Companies"
    description: "CANSLIM-based quality growth screens"
    filters:
      - P/E = Low (<15)
      - Dividend Yield = Over 1%
      - Price = Over $10
      - Average Volume = Over 500K
    top_k: 15

  canslim_1_a_plus:
    name: "CANSLIM #1 A+ Companies"
    description: "Premium CANSLIM A-list stocks"
    filters:
      - P/E = Low (<15)
      - Dividend Yield = Positive (>0%)
      - Return on Equity = Over +15%
      - Price = Over $10
    top_k: 15

  david_ryan_core:
    name: "David Ryan Core"
    description: "Core holdings based on Ryan's methodology"
    filters:
      - Market Cap. = Small ($300mln to $2bln)
      - EPS growthnext 5 years = Over 25%
      - Return on Equity = Over +15%
      - Price = Over $10
    top_k: 15

shadow_test_config:
  # Shadow test parameters for FinViz vs VIF comparison
  min_overlap_pct: 30        # Minimum % overlap to consider "aligned"
  novel_threshold: 0.75       # Confidence threshold for "novel discoveries"
  daily_comparison: true      # Compare daily signals
  report_path: reports/finviz_vif_comparison.json
